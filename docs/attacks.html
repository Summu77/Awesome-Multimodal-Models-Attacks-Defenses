<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attack Papers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body data-page="attacks" data-section="attacks">
    <header id="site-header"></header>
    <main class="page-shell">
      <section class="page-hero">
        <div class="page-hero-top">
          <div>
            <p class="eyebrow" id="page-eyebrow"></p>
            <h1 id="page-title"></h1>
            <p class="lead" id="page-description"></p>
          </div>
          <div class="hero-view-control filter-field">
            <button id="view-toggle" class="view-toggle" type="button" aria-pressed="false">
              Card view
            </button>
          </div>
        </div>
        <div class="hero-inline-nav" id="attack-category-nav"></div>
      </section>
      <section class="section-block compact">
        <div id="attack-sections"></div>
        <div class="empty-state hidden" id="empty-state">
          No papers match the current filters.
        </div>
      </section>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="./assets/js/attacks.js"></script>
  </body>
</html>
